<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Monthsary!</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; color: white; font-family: sans-serif; text-align: center; }
        canvas { display: block; image-rendering: pixelated; cursor: pointer; }
        #instructions { position: absolute; top: 15%; width: 100%; font-size: 1.5rem; pointer-events: none; transition: opacity 1s; font-weight: bold; }
    </style>
</head>
<body>
    <div id="instructions">Tap the matchstick to light it...</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- AUDIO ASSETS ---
        const sndStrike = new Audio('strike.mp3');
        const sndLaunch = new Audio('launch.mp3');
        const sndExplode = new Audio('explosion.mp3');

        // Function to play sounds even if they overlap
        function playSnd(audioVar, volume = 1) {
            const clone = audioVar.cloneNode();
            clone.volume = volume;
            clone.play();
        }

        // --- IMAGE LOADING ---
        const matchImg = new Image();
        matchImg.src = 'match.png'; 

        const flameImages = [];
        const totalFrames = 8;
        let imagesLoaded = 0;

        for (let i = 1; i <= totalFrames; i++) {
            const img = new Image();
            img.src = `flame${i}.png`; 
            img.onload = () => { imagesLoaded++; };
            flameImages.push(img);
        }

        let state = 'idle'; 
        let matchY = canvas.height / 2;
        const matchX = canvas.width / 2;
        let flameFrame = 0;
        let frameTick = 0;

        const displayWidth = 300; 
        const displayHeight = 300; 

        let particles = [];
        let fireworks = [];
        let textExplosions = [];
        const texts = ["I miss you", "I love you bebe", "Happy 5th Monthsary"];

        function drawMatch() {
            if (state === 'fireworks') return;
            let currentImg = (state === 'idle') ? matchImg : flameImages[flameFrame];
            if (currentImg.complete) {
                ctx.drawImage(currentImg, matchX - 150, matchY - 150, 300, 300);
            }
            if (state === 'falling') {
                frameTick++;
                if (frameTick % 6 === 0) flameFrame = (flameFrame + 1) % totalFrames;
            }
        }

        // --- FIREWORK LOGIC WITH SOUND ---
        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height / 2) + 50;
                this.speed = Math.random() * 3 + 4;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.isText = Math.random() > 0.5;
                
                // Play launch sound
                playSnd(sndLaunch, 0.4); 
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) { this.explode(); return false; }
                return true;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill();
            }
            explode() {
                // Play explosion sound
                playSnd(sndExplode, 0.6);

                if (this.isText) {
                    textExplosions.push(new TextExplosion(this.x, this.y, texts[Math.floor(Math.random() * texts.length)], this.color));
                } else {
                    for (let i = 0; i < 60; i++) particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.07; this.alpha -= 0.012;
                return this.alpha > 0;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class TextExplosion {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.alpha = 1; this.scale = 0.4;
            }
            update() { this.y -= 0.4; this.scale += 0.025; this.alpha -= 0.008; return this.alpha > 0; }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${28 * this.scale}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawMatch();
            if (state === 'falling') {
                matchY += 6; 
                if (matchY > canvas.height + 300) {
                    state = 'fireworks';
                    setTimeout(() => { window.location.href = 'memories.html'; }, 30000);
                }
            }
            if (state === 'fireworks') {
                if (Math.random() < 0.06) fireworks.push(new Firework());
            }
            fireworks = fireworks.filter(f => { f.draw(); return f.update(); });
            particles = particles.filter(p => { p.draw(); return p.update(); });
            textExplosions = textExplosions.filter(t => { t.draw(); return t.update(); });
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (state !== 'idle') return;
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            if (clickX > matchX - 150 && clickX < matchX + 150 && clickY > matchY - 150 && clickY < matchY + 150) {
                // Play strike sound
                playSnd(sndStrike);
                state = 'falling';
                document.getElementById('instructions').style.opacity = 0;
            }
        });

        animate();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
